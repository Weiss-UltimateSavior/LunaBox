name: Release

on:
  push:
    tags:
      - 'v*.*.*'  # 例如: v1.0.0, v1.2.3
  workflow_dispatch:

jobs:
  build-release:
    name: Build Release
    runs-on: ${{ matrix.arch == 'arm64' && 'windows-11-arm' || 'windows-latest' }}
    strategy:
      matrix:
        arch: [amd64, arm64]
        mode: [portable, installer]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: 'frontend/pnpm-lock.yaml'

      - name: Setup Wails
        run: |
          $WailsVersion = (go list -m -f "{{.Version}}" github.com/wailsapp/wails/v2).Trim()
          go install "github.com/wailsapp/wails/v2/cmd/wails@$WailsVersion"
        shell: pwsh

      - name: Setup MSYS2 for ARM64 CGO
        id: msys2
        if: matrix.arch == 'arm64'
        uses: msys2/setup-msys2@v2
        with:
          msystem: CLANGARM64
          path-type: inherit
          install: mingw-w64-clang-aarch64-toolchain

      - name: Install NSIS
        if: matrix.mode == 'installer'
        run: |
          choco install nsis -y
          echo "C:\Program Files (x86)\NSIS" >> $env:GITHUB_PATH
        shell: pwsh

      - name: Configure build architecture
        run: |
          "GOOS=windows" >> $env:GITHUB_ENV
          "GOARCH=${{ matrix.arch }}" >> $env:GITHUB_ENV
          $env:GOOS = "windows"
          $env:GOARCH = "${{ matrix.arch }}"

          if ("${{ matrix.arch }}" -eq "arm64") {
            $SourceDir = Join-Path $PWD "lib\winarm64"
            $BuildLibDir = Join-Path $PWD "build\duckdb\winarm64"
            $DuckDBDll = Join-Path $SourceDir "duckdb.dll"
            $DuckDBLib = Join-Path $SourceDir "duckdb.lib"

            if (!(Test-Path $DuckDBDll) -or !(Test-Path $DuckDBLib)) {
              throw "Win-ARM64 DuckDB dynamic library is missing under lib\winarm64."
            }

            New-Item -ItemType Directory -Force -Path $BuildLibDir | Out-Null
            Copy-Item $DuckDBDll -Destination (Join-Path $BuildLibDir "duckdb.dll") -Force
            Copy-Item $DuckDBLib -Destination (Join-Path $BuildLibDir "duckdb.lib") -Force
            Copy-Item $DuckDBLib -Destination (Join-Path $BuildLibDir "libduckdb.dll.a") -Force

            $Msys2Location = "${{ steps.msys2.outputs.msys2-location }}"
            if ([string]::IsNullOrWhiteSpace($Msys2Location)) {
              throw "MSYS2 location output is empty."
            }

            $ClangArm64Bin = Join-Path $Msys2Location "clangarm64\bin"
            $Clang = Join-Path $ClangArm64Bin "clang.exe"
            $ClangXX = Join-Path $ClangArm64Bin "clang++.exe"
            if (!(Test-Path $Clang) -or !(Test-Path $ClangXX)) {
              throw "MSYS2 CLANGARM64 compiler was not found under $ClangArm64Bin."
            }
            $TargetTriple = "aarch64-w64-windows-gnu"
            $ClangTarget = (& $Clang --target=$TargetTriple -dumpmachine).Trim()
            if ($ClangTarget -notmatch "aarch64|arm64") {
              throw "MSYS2 CLANGARM64 compiler has unexpected target with --target=$TargetTriple`: $ClangTarget."
            }
            Write-Host "Using ARM64 CGO compiler: $Clang --target=$TargetTriple ($ClangTarget)"

            "CGO_ENABLED=1" >> $env:GITHUB_ENV
            "CC=$Clang --target=$TargetTriple" >> $env:GITHUB_ENV
            "CXX=$ClangXX --target=$TargetTriple" >> $env:GITHUB_ENV
            "CGO_LDFLAGS=-L$BuildLibDir -lduckdb" >> $env:GITHUB_ENV
            "GO_BUILD_TAGS=duckdb_use_lib" >> $env:GITHUB_ENV
            "DUCKDB_DYNAMIC_DLL=$(Join-Path $BuildLibDir "duckdb.dll")" >> $env:GITHUB_ENV
            $env:CGO_ENABLED = "1"
            $env:CC = "$Clang --target=$TargetTriple"
            $env:CXX = "$ClangXX --target=$TargetTriple"
            $env:CGO_LDFLAGS = "-L$BuildLibDir -lduckdb"
            $env:PATH = "$ClangArm64Bin;$BuildLibDir;$env:PATH"
            go env -w CGO_ENABLED=1 CC="$env:CC" CXX="$env:CXX" CGO_LDFLAGS="$env:CGO_LDFLAGS"
            go env GOOS GOARCH GOHOSTOS GOHOSTARCH CGO_ENABLED CC CXX CGO_LDFLAGS
            go test -run "^$" -tags duckdb_use_lib github.com/duckdb/duckdb-go-bindings
            $ClangArm64Bin >> $env:GITHUB_PATH
            $BuildLibDir >> $env:GITHUB_PATH
          }
        shell: pwsh

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: pnpm install

      - name: Get version from tag
        id: get_version
        run: |
          $VERSION = "${{ github.ref_name }}" -replace '^v', ''
          echo "VERSION=$VERSION" >> $env:GITHUB_OUTPUT
          $COMMIT = "${{ github.sha }}".Substring(0,7)
          echo "COMMIT=$COMMIT" >> $env:GITHUB_OUTPUT
          $BUILD_TIME = Get-Date -Format "yyyy-MM-dd HH:mm:ss"
          echo "BUILD_TIME=$BUILD_TIME" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Build Portable Version
        if: matrix.mode == 'portable'
        run: |
          $ErrorActionPreference = "Stop"
          $LDFLAGS = "-s -w -X 'lunabox/internal/version.Version=${{ steps.get_version.outputs.VERSION }}' -X 'lunabox/internal/version.GitCommit=${{ steps.get_version.outputs.COMMIT }}' -X 'lunabox/internal/version.BuildTime=${{ steps.get_version.outputs.BUILD_TIME }}' -X 'lunabox/internal/version.BuildMode=portable' -X 'lunabox/internal/version.BangumiOAuthClientID=$env:LUNABOX_BANGUMI_CLIENT_ID' -X 'lunabox/internal/version.BangumiOAuthClientSecret=$env:LUNABOX_BANGUMI_CLIENT_SECRET'"
          $BUILD_TAGS = @()
          if ($env:GO_BUILD_TAGS) {
            $BUILD_TAGS = @("-tags", $env:GO_BUILD_TAGS)
          }

          # Build GUI
          wails build @BUILD_TAGS -platform windows/${{ matrix.arch }} -ldflags "$LDFLAGS" -o LunaBox-${{ steps.get_version.outputs.VERSION }}-windows-${{ matrix.arch }}-portable.exe
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          
          # Build CLI
          go build @BUILD_TAGS -trimpath -ldflags "$LDFLAGS" -o build/bin/lunacli.exe ./cmd/lunacli
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
        shell: pwsh
        env:
          LUNABOX_BANGUMI_CLIENT_ID: ${{ vars.LUNABOX_BANGUMI_CLIENT_ID }}
          LUNABOX_BANGUMI_CLIENT_SECRET: ${{ secrets.LUNABOX_BANGUMI_CLIENT_SECRET }}

      - name: Build Installer Version
        if: matrix.mode == 'installer'
        run: |
          $ErrorActionPreference = "Stop"
          $LDFLAGS = "-s -w -X 'lunabox/internal/version.Version=${{ steps.get_version.outputs.VERSION }}' -X 'lunabox/internal/version.GitCommit=${{ steps.get_version.outputs.COMMIT }}' -X 'lunabox/internal/version.BuildTime=${{ steps.get_version.outputs.BUILD_TIME }}' -X 'lunabox/internal/version.BuildMode=installer' -X 'lunabox/internal/version.BangumiOAuthClientID=$env:LUNABOX_BANGUMI_CLIENT_ID' -X 'lunabox/internal/version.BangumiOAuthClientSecret=$env:LUNABOX_BANGUMI_CLIENT_SECRET'"
          $BUILD_TAGS = @()
          if ($env:GO_BUILD_TAGS) {
            $BUILD_TAGS = @("-tags", $env:GO_BUILD_TAGS)
          }
          
          # Build CLI first (needed for installer)
          go build @BUILD_TAGS -trimpath -ldflags "$LDFLAGS" -o build/bin/lunacli.exe ./cmd/lunacli
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          Remove-Item "build/bin/duckdb.dll" -Force -ErrorAction SilentlyContinue
          if ($env:DUCKDB_DYNAMIC_DLL) {
            Copy-Item $env:DUCKDB_DYNAMIC_DLL -Destination "build/bin/duckdb.dll" -Force
          }
          
          # Build GUI with NSIS
          wails build @BUILD_TAGS -platform windows/${{ matrix.arch }} -ldflags "$LDFLAGS" -nsis
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
        shell: pwsh
        env:
          LUNABOX_BANGUMI_CLIENT_ID: ${{ vars.LUNABOX_BANGUMI_CLIENT_ID }}
          LUNABOX_BANGUMI_CLIENT_SECRET: ${{ secrets.LUNABOX_BANGUMI_CLIENT_SECRET }}

      - name: Create portable ZIP
        if: matrix.mode == 'portable'
        run: |
          $ErrorActionPreference = "Stop"
          $PKG_NAME = "LunaBox-${{ steps.get_version.outputs.VERSION }}-windows-${{ matrix.arch }}-portable"
          $PKG_DIR = "build/bin/$PKG_NAME"
          New-Item -ItemType Directory -Force -Path "$PKG_DIR"
          New-Item -ItemType Directory -Force -Path "$PKG_DIR/backups"
          New-Item -ItemType Directory -Force -Path "$PKG_DIR/covers"
          
          Copy-Item "build/bin/$PKG_NAME.exe" -Destination "$PKG_DIR/LunaBox.exe"
          Copy-Item "build/bin/lunacli.exe" -Destination "$PKG_DIR/lunacli.exe"
          if ($env:DUCKDB_DYNAMIC_DLL) {
            Copy-Item $env:DUCKDB_DYNAMIC_DLL -Destination "$PKG_DIR/duckdb.dll"
          }
          
          Compress-Archive -Path "$PKG_DIR" -DestinationPath "$PKG_NAME.zip"
        shell: pwsh

      - name: Rename installer
        if: matrix.mode == 'installer'
        run: |
          $ErrorActionPreference = "Stop"
          Write-Host "Files in build/bin:"
          Get-ChildItem -Path "build/bin" -Filter "*.exe" -Recurse
          
          if (Test-Path "build/bin/lunabox-${{ matrix.arch }}-installer.exe") {
            Move-Item -Path "build/bin/lunabox-${{ matrix.arch }}-installer.exe" -Destination "LunaBox-${{ steps.get_version.outputs.VERSION }}-windows-${{ matrix.arch }}-setup.exe"
          } elseif (Test-Path "build/bin/LunaBox-${{ matrix.arch }}-installer.exe") {
            Move-Item -Path "build/bin/LunaBox-${{ matrix.arch }}-installer.exe" -Destination "LunaBox-${{ steps.get_version.outputs.VERSION }}-windows-${{ matrix.arch }}-setup.exe"
          } else {
            throw "Installer not found for ${{ matrix.arch }}."
          }
        shell: pwsh

      - name: Upload Portable Artifact
        if: matrix.mode == 'portable'
        uses: actions/upload-artifact@v4
        with:
          name: lunabox-${{ steps.get_version.outputs.VERSION }}-windows-${{ matrix.arch }}-portable
          path: LunaBox-${{ steps.get_version.outputs.VERSION }}-windows-${{ matrix.arch }}-portable.zip
          if-no-files-found: error

      - name: Upload Installer Artifact
        if: matrix.mode == 'installer'
        uses: actions/upload-artifact@v4
        with:
          name: lunabox-${{ steps.get_version.outputs.VERSION }}-windows-${{ matrix.arch }}-installer
          path: LunaBox-${{ steps.get_version.outputs.VERSION }}-windows-${{ matrix.arch }}-setup.exe
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    needs: build-release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Display structure of downloaded files
        run: ls -R ./artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          find ./artifacts -type f \( -name "*.zip" -o -name "*.exe" \) -exec cp {} ./release/ \;
          ls -lh ./release

      - name: Generate release notes
        id: release_notes
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"

          # 检查是否存在 CHANGELOG.md
          if [ -f "CHANGELOG.md" ]; then
            # 提取当前版本的 changelog
            # 命中 ## VERSION / ## vVERSION 后，输出到下一个二级标题前为止
            awk -v version="$VERSION" '
              function normalize_heading(line, heading) {
                heading = line
                sub(/^##[[:space:]]+/, "", heading)
                sub(/^v/, "", heading)
                sub(/[[:space:]]+$/, "", heading)
                return heading
              }

              /^##[[:space:]]+/ {
                current = normalize_heading($0)
                if (found && current != version) {
                  exit
                }
                if (current == version) {
                  found = 1
                }
              }

              found {
                print
              }
            ' CHANGELOG.md > release_notes.md

            # 如果没有找到对应版本的内容，文件会是空的
            if [ ! -s release_notes.md ]; then
              echo "未找到版本 ${VERSION} 的 changelog，使用默认模板"
              rm -f release_notes.md
            fi
          fi

          # 如果没有从 CHANGELOG.md 提取到内容，使用默认模板
          if [ ! -f "release_notes.md" ]; then
            cat << EOF > release_notes.md
          ## LunaBox ${{ steps.get_version.outputs.VERSION }}

          ### 📝 更新内容

          请查看 [Commits](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }})
          EOF
          fi

          # 添加下载说明
          echo "" >> release_notes.md
          echo "---" >> release_notes.md
          echo "" >> release_notes.md
          echo "### 📦 下载说明" >> release_notes.md
          echo "" >> release_notes.md
          echo "| 文件 | 说明 |" >> release_notes.md
          echo "|------|------|" >> release_notes.md
          echo "| \`*-portable.zip\` | 便携版，解压即用，数据存储在程序目录 |" >> release_notes.md
          echo "| \`*-setup.exe\` | 安装版，标准安装程序，数据存储在 %APPDATA%\\\\LunaBox |" >> release_notes.md
          echo "" >> release_notes.md
          echo "### 🔗 相关链接" >> release_notes.md
          echo "" >> release_notes.md
          echo "- [查看所有提交](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }})" >> release_notes.md
          echo "- [版本对比](https://github.com/${{ github.repository }}/compare/${{ github.event.before }}...${{ github.ref_name }})" >> release_notes.md

          cat release_notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          body_path: release_notes.md
          draft: false
          prerelease: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
